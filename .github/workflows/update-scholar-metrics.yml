name: Update Scholar Metrics

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-scholar-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Google Scholar metrics from SerpAPI
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          AUTHOR_ID: pUSXwTMAAAAJ
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          from urllib.parse import urlencode
          from urllib.request import urlopen

          api_key = os.environ["SERPAPI_KEY"]
          author_id = os.environ["AUTHOR_ID"]

          query = urlencode({
              "engine": "google_scholar_author",
              "api_key": api_key,
              "author_id": author_id,
              "hl": "en",
          })
          url = f"https://serpapi.com/search.json?{query}"

          with urlopen(url) as response:
              payload = json.load(response)

          cited_by_rows = payload.get("cited_by", {}).get("table", [])
          citations = "N/A"
          h_index = "N/A"

          for row in cited_by_rows:
              if "citations" in row:
                  citations = row.get("citations", {}).get("all", "N/A")
              if "h_index" in row:
                  h_index = row.get("h_index", {}).get("all", "N/A")

          output_path = Path("data/scholar-metrics.json")
          output_path.parent.mkdir(parents=True, exist_ok=True)
          output_path.write_text(
              json.dumps(
                  {
                      "citations": citations,
                      "h_index": h_index,
                      "updated_at": payload.get("search_metadata", {}).get("created_at"),
                  },
                  indent=2,
              ) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Commit updated metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/scholar-metrics.json
          git diff --cached --quiet && exit 0
          git commit -m "Update scholar metrics"
          git push